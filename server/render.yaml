services:
  - type: web
    name: bragboard-api
    runtime: python
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bragboard-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: bragboard-db
    databaseName: bragboard_db
    user: bragboard_user
    plan: free